experience:
  - role: "R&D AI Engineer - Satellite and Document Image Processing"
    org: "Diginove - Aix en Provence, France"
    start: "2024-09-01"
    summary: |
      * For a **European Space Agency**'s R&D project exploring future satellite mission capabilities :
        * Led the work internally as **sole** Diginove **contributor and point-of-contact** for consortium partners
        * Developed a conditional **GAN to enhance** thermal satellite imagery, from 1000m to 30m pixel **resolution** (×33), achieving SSIM ≈ 98.8% against high-resolution references
        * Uncovered pre-fire condition patterns through exploratory data analysis; developed anomaly detection and intensity forecasting tools in direct **collaboration with firefighters**.
        * Presented a poster at **AI4EO 2025** on the developed spatio-temporal fusion model.
      * Built **end-to-end pipelines** for TB-scale multi-modal EO datasets (thermal, optical, SAR, hyperspectral), from API ingestion and format handling to physics-informed processing, ensuring alignment, fusion, and geometric consistency across satellite sources.
      * Organized monthly **knowledge-sharing sessions** on cutting-edge methods (ViTs, VLMs, Foundation Models, LoRA...) and their EO applications (building characterization, oil-spill detection...)
      * **Co-supervised PhD research** on tree species classification and VOC emission estimation from hyperspectral imagery.
      * Authored and coordinated technical proposals for **funding programs** from **Horizon Europe** and **CNES**.
      * Built and deployed an **AI pipeline to extract structured text** from digitized documents (handwritten and typed health records), integrated into an existing C++ software with low computing demands.

  - role: "Research Intern - Multispectral Image Processing"
    org: "Synchromedia Lab - Montreal, Canada"
    start: "2024-01-01"
    end: "2024-08-31"
    summary: |
      * Addressed a literature gap on **unsupervised segmentation** of multispectral images of ancient handwritten documents via Blind Source Separation - Spectral Unmixing.
      * **Designed a novel hybrid model** combining a convolutional attention encoder with a Non-Negative Matrix Factorization (NMF) decoder, introducing a linear independence constraint on the latent space.
      * Built the **full experimental pipeline**: dataset curation, model training, ablation studies, and benchmarking against state-of-the-art approaches.
      * Authored a research paper submitted at **ICASSP 2025**; code available.
  - role: "Automation Intern - Robotics"
    org: "Bioderma Naos Group - Aix en Provence, France"
    start: "2021-05-01"
    end: "2021-08-31"
    summary: |
      * Implemented a synchronization tool and **real-time dashboard** linking the production line to the **palletizing robot** system, using Python and OPC server communication between PLCs.
      * Improved production visibility and reduced operational friction, saving tens of minutes per day.
      * Internship led to the creation of a **follow-up position** to continue the optimization work.
